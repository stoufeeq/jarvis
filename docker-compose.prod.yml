services:
  # ── Production overrides: GHCR images + Docker-internal hostnames ────────────
  # The backend's .env file uses local Mac dev hostnames/ports (localhost:6382 etc).
  # In production all services live on the same Docker network and must use
  # internal container names + standard ports. These environment values override
  # whatever .env says.

  backend:
    image: ghcr.io/stoufeeq/jarvis-backend:latest
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://jarvis:jarvis_dev@postgres:5432/jarvis
      DATABASE_URL_SYNC: postgresql://jarvis:jarvis_dev@postgres:5432/jarvis
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      # Git SHA forwarded from the deploy workflow's shell env so the
      # /health endpoint (and Sentry release tag) report the deployed commit.
      GIT_SHA: ${GIT_SHA:-unknown}

  celery_worker:
    image: ghcr.io/stoufeeq/jarvis-backend:latest
    build:
      context: ./backend
    environment:
      COMMAND: worker  # entrypoint switches on this — without it, container runs uvicorn instead
      DATABASE_URL: postgresql+asyncpg://jarvis:jarvis_dev@postgres:5432/jarvis
      DATABASE_URL_SYNC: postgresql://jarvis:jarvis_dev@postgres:5432/jarvis
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      # Git SHA forwarded from the deploy workflow's shell env so the
      # /health endpoint (and Sentry release tag) report the deployed commit.
      GIT_SHA: ${GIT_SHA:-unknown}

  celery_beat:
    image: ghcr.io/stoufeeq/jarvis-backend:latest
    build:
      context: ./backend
    environment:
      COMMAND: beat  # entrypoint switches on this — without it, container runs uvicorn instead
      DATABASE_URL: postgresql+asyncpg://jarvis:jarvis_dev@postgres:5432/jarvis
      DATABASE_URL_SYNC: postgresql://jarvis:jarvis_dev@postgres:5432/jarvis
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      # Git SHA forwarded from the deploy workflow's shell env so the
      # /health endpoint (and Sentry release tag) report the deployed commit.
      GIT_SHA: ${GIT_SHA:-unknown}

  flower:
    image: ghcr.io/stoufeeq/jarvis-backend:latest
    build:
      context: ./backend
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
